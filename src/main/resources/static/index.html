<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отчёт по начислениям</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        body {
            font-family: -apple-system, Segoe UI, Arial, sans-serif;
            max-width: 1180px;
            margin: 30px auto;
            padding: 0 16px;
            color: #222;
        }
        h1 { font-size: 20px; margin-bottom: 4px; }
        .sub { color: #666; margin-bottom: 24px; font-size: 14px; }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label { font-size: 13px; color: #555; }
        .field input, .field select {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            min-width: 220px;
        }
        button {
            padding: 9px 18px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        button.secondary {
            background: #f3f4f6;
            color: #111;
            border: 1px solid #ccc;
        }
        button.secondary:hover { background: #e5e7eb; }

        #status { font-size: 13px; color: #666; margin-bottom: 12px; min-height: 18px; }

        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 13px;
            white-space: nowrap;
        }
        th, td {
            text-align: left;
            padding: 6px 8px;
            border-bottom: 1px solid #eee;
        }
        th { background: #fafafa; font-weight: 600; position: sticky; top: 0; }
        td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
        td.total, th.total { font-weight: 600; background: #f8fafc; }

        #chartWrap { max-width: 100%; margin-top: 24px; }
        #summary { margin-top: 8px; font-size: 14px; color: #333; }

        .tabs { display: flex; gap: 8px; margin-top: 28px; margin-bottom: 8px; }
        .tab-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #f3f4f6;
            color: #111;
            font-size: 13px;
            cursor: pointer;
        }
        .tab-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
    </style>
</head>
<body>

<h1>Отчёт по начислениям сотрудников</h1>
<div class="sub">Выберите школу, организацию (группу кодов) или название для поиска и год — построится таблица и график по сумме начислений за год, по ФИО от А до Я, с разбивкой по месяцам.</div>

<div class="form-row">
    <div class="field">
        <label>Тип поиска</label>
        <select id="mode">
            <option value="locality-group">По организации (группа кодов школ)</option>
            <option value="school">По точному номеру школы (NOM_SCOL)</option>
            <option value="locality">По вхождению в название (запасной вариант)</option>
        </select>
    </div>

    <div class="field" id="localityGroupField">
        <label>Организация</label>
        <select id="localitySelect">
            <option value="">— загрузка списка —</option>
        </select>
    </div>

    <div class="field" id="valueField" style="display:none">
        <label id="valueLabel">Номер школы</label>
        <input id="value" type="text" placeholder="006" />
    </div>

    <div class="field">
        <label>Год</label>
        <input id="year" type="number" value="2024" style="width:90px" />
    </div>
    <button onclick="loadReport()">Построить отчёт</button>
    <button class="secondary" onclick="downloadXlsx()">Скачать Excel</button>
</div>

<div id="status"></div>
<div id="summary"></div>

<div class="tabs">
    <button class="tab-btn active" id="tabMonthly" onclick="showChart('monthly')">По месяцам (всего)</button>
    <button class="tab-btn" id="tabByEmployee" onclick="showChart('byEmployee')">Топ-20 сотрудников</button>
</div>

<div id="chartWrap">
    <canvas id="chart" height="90"></canvas>
</div>

<div class="table-wrap">
    <table id="resultTable" style="display:none">
        <thead>
        <tr id="resultHeaderRow">
            <th>ФИО</th>
            <th>Должность</th>
            <th>Таб. номер</th>
            <!-- месяцы добавляются скриптом -->
            <th class="num total">Итого за год</th>
        </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    let chartInstance = null;
    let lastRows = [];
    let lastYear = 2024;
    let activeChart = 'monthly';
    const MONTH_NAMES = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

    // подгружаем список организаций (locality_group) для выпадающего списка
    async function loadLocalities() {
        const select = document.getElementById('localitySelect');
        try {
            const res = await fetch('/api/localities');
            const names = await res.json();
            select.innerHTML = '';
            if (names.length === 0) {
                select.innerHTML = '<option value="">— группы не заведены —</option>';
                return;
            }
            for (const name of names) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            }
        } catch (e) {
            select.innerHTML = '<option value="">— ошибка загрузки —</option>';
        }
    }
    loadLocalities();

    document.getElementById('mode').addEventListener('change', (e) => {
        const mode = e.target.value;
        const groupField = document.getElementById('localityGroupField');
        const valueField = document.getElementById('valueField');
        const label = document.getElementById('valueLabel');
        const input = document.getElementById('value');

        if (mode === 'locality-group') {
            groupField.style.display = '';
            valueField.style.display = 'none';
        } else {
            groupField.style.display = 'none';
            valueField.style.display = '';
            if (mode === 'locality') {
                label.textContent = 'Ключевое слово в названии';
                input.placeholder = 'Никитин';
            } else {
                label.textContent = 'Номер школы';
                input.placeholder = '006';
            }
        }
    });
    document.getElementById('mode').dispatchEvent(new Event('change'));

    function currentParams() {
        const mode = document.getElementById('mode').value;
        const value = mode === 'locality-group'
            ? document.getElementById('localitySelect').value
            : document.getElementById('value').value.trim();
        const year = document.getElementById('year').value.trim();
        return { mode, value, year };
    }

    async function loadReport() {
        const { mode, value, year } = currentParams();
        const status = document.getElementById('status');
        const table = document.getElementById('resultTable');
        const body = document.getElementById('resultBody');
        const summary = document.getElementById('summary');

        if (!value || !year) {
            status.textContent = 'Заполните поле поиска и год.';
            return;
        }

        status.textContent = 'Загрузка...';
        table.style.display = 'none';
        body.innerHTML = '';
        summary.textContent = '';

        try {
            const url = `/api/report/data?mode=${encodeURIComponent(mode)}&value=${encodeURIComponent(value)}&year=${encodeURIComponent(year)}`;
            const res = await fetch(url);
            if (!res.ok) {
                throw new Error('Сервер вернул ошибку ' + res.status);
            }
            const rows = await res.json();
            lastRows = rows;
            lastYear = year;

            if (rows.length === 0) {
                status.textContent = 'Ничего не найдено по этому запросу.';
                renderActiveChart();
                return;
            }

            status.textContent = `Найдено сотрудников: ${rows.length}`;
            const total = rows.reduce((s, r) => s + (r.totalAccrued || 0), 0);
            summary.textContent = `Сумма начислений за ${year} год по всем найденным сотрудникам: ${fmt(total)} ₽`;

            buildTableHeader();
            for (const r of rows) {
                const tr = document.createElement('tr');
                let cells = `
          <td>${escapeHtml(r.fio || '')}</td>
          <td>${escapeHtml(r.naimDol || '')}</td>
          <td>${escapeHtml(r.tabNom || '')}</td>
        `;
                for (let m = 1; m <= 12; m++) {
                    const v = (r.monthly && r.monthly[m]) || 0;
                    cells += `<td class="num">${fmt(v)}</td>`;
                }
                cells += `<td class="num total">${fmt(r.totalAccrued || 0)}</td>`;
                tr.innerHTML = cells;
                body.appendChild(tr);
            }
            table.style.display = '';

            renderActiveChart();
        } catch (err) {
            status.textContent = 'Ошибка: ' + err.message;
            renderActiveChart();
        }
    }

    function buildTableHeader() {
        const headerRow = document.getElementById('resultHeaderRow');
        headerRow.innerHTML = '<th>ФИО</th><th>Должность</th><th>Таб. номер</th>';
        for (const name of MONTH_NAMES) {
            headerRow.innerHTML += `<th class="num">${name}</th>`;
        }
        headerRow.innerHTML += '<th class="num total">Итого за год</th>';
    }

    function fmt(v) {
        return v.toLocaleString('ru-RU', {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    function showChart(which) {
        activeChart = which;
        document.getElementById('tabMonthly').classList.toggle('active', which === 'monthly');
        document.getElementById('tabByEmployee').classList.toggle('active', which === 'byEmployee');
        renderActiveChart();
    }

    function renderActiveChart() {
        if (activeChart === 'monthly') {
            renderMonthlyChart(lastRows);
        } else {
            renderByEmployeeChart(lastRows);
        }
    }

    function renderMonthlyChart(rows) {
        const ctx = document.getElementById('chart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        if (rows.length === 0) return;

        const totalsByMonth = new Array(12).fill(0);
        for (const r of rows) {
            for (let m = 1; m <= 12; m++) {
                totalsByMonth[m - 1] += (r.monthly && r.monthly[m]) || 0;
            }
        }

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: MONTH_NAMES,
                datasets: [{
                    label: `Сумма начислений по всем сотрудникам, ${lastYear}`,
                    data: totalsByMonth,
                    backgroundColor: '#2563eb'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    function renderByEmployeeChart(rows) {
        const ctx = document.getElementById('chart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        if (rows.length === 0) return;

        const sorted = [...rows].sort((a, b) => (b.totalAccrued || 0) - (a.totalAccrued || 0));
        const top = sorted.slice(0, 20);

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: top.map(r => r.fio),
                datasets: [{
                    label: 'Сумма начислений за год',
                    data: top.map(r => r.totalAccrued || 0),
                    backgroundColor: '#2563eb'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { autoSkip: false, maxRotation: 60, minRotation: 30, font: { size: 10 } } },
                    y: { beginAtZero: true }
                }
            }
        });
    }

    function downloadXlsx() {
        const { mode, value, year } = currentParams();
        if (!value || !year) {
            document.getElementById('status').textContent = 'Заполните поле поиска и год.';
            return;
        }
        let url;
        if (mode === 'locality-group') {
            url = `/api/report/by-locality-group?locality=${encodeURIComponent(value)}&year=${encodeURIComponent(year)}`;
        } else if (mode === 'locality') {
            url = `/api/report/by-locality?keyword=${encodeURIComponent(value)}&year=${encodeURIComponent(year)}`;
        } else {
            url = `/api/report?nomScol=${encodeURIComponent(value)}&year=${encodeURIComponent(year)}`;
        }
        window.location.href = url;
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }
</script>

</body>
</html>
